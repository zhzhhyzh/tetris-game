  <rect x="0" y="8" width="24" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="0" y="16" width="8" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="0" y="24" width="24" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="24" y="8" width="8" height="3" rx="1" fill="rgba(255,255,255,0.2)"/>
