<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- T-piece (purple) -->
  <rect x="8" y="0" width="8" height="8" rx="1" fill="#d500f9"/>
  <rect x="0" y="8" width="8" height="8" rx="1" fill="#d500f9"/>
  <rect x="8" y="8" width="8" height="8" rx="1" fill="#d500f9"/>
  <rect x="16" y="8" width="8" height="8" rx="1" fill="#d500f9"/>
  <!-- L-piece (orange) -->
  <rect x="0" y="16" width="8" height="8" rx="1" fill="#ff9100"/>
  <rect x="0" y="24" width="8" height="8" rx="1" fill="#ff9100"/>
  <rect x="8" y="24" width="8" height="8" rx="1" fill="#ff9100"/>
  <rect x="16" y="24" width="8" height="8" rx="1" fill="#ff9100"/>
  <!-- I-piece (cyan) -->
  <rect x="24" y="8" width="8" height="8" rx="1" fill="#00e5ff"/>
